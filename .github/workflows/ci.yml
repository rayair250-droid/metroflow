name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev + animate extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,animate]"
      - name: Lint (ruff)
        run: ruff check metroflow/ tests/
      - name: Type-check (mypy)
        run: mypy metroflow/
      - name: Run tests
        env:
          MPLBACKEND: Agg
        run: pytest -q
      - name: Smoke-test the CLI
        env:
          MPLBACKEND: Agg
        run: |
          python -m metroflow compare --scenario scenarios/rush_incident.yaml \
            --seed 42 --controllers baseline,reactive,predictive
